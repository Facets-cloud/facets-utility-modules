{{- if eq .Values.spec.type "kedajob" }}
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: {{ include "app-chart.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-chart.metadataLabels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    {{- if ( hasKey .Values.metadata "annotations" ) }}
    {{- include "app-chart.metadataAnnotations" . | nindent 4 }}
    {{- end }}
spec:
  jobTargetRef:
    parallelism: 1
    completions: 1
    backoffLimit: {{ default 0 .Values.spec.kedajob.backoff_limit }}
    template:
      metadata:
        labels:
          {{- include "app-chart.metadataLabels" . | nindent 10 }}
        {{- if ( hasKey .Values.metadata "annotations" ) }}
        annotations:
          {{- include "app-chart.metadataAnnotations" . | nindent 10 }}
        {{- end }}
      spec:
        restartPolicy: Never
        {{- if and ( hasKey .Values.advanced.common.app_chart.values "termination_grace_period_seconds") (gt (default 0 (int .Values.advanced.common.app_chart.values.termination_grace_period_seconds)) 0) }}
        terminationGracePeriodSeconds: {{ .Values.advanced.common.app_chart.values.termination_grace_period_seconds }}
        {{- end }}
        enableServiceLinks: {{ .Values.advanced.common.app_chart.values.enable_service_links }}
        priorityClassName: {{ include "app-chart.priorityClassName" . }}
        serviceAccountName: {{ .Values.advanced.common.app_chart.values.service_account_name | default (printf "%s-sa" (include "app-chart.fullname" .)) }}
        {{- if ( hasKey .Values.advanced.common.app_chart.values "security_context") }}
        {{- include "app-chart.securityContext" . | nindent 8 -}}
        {{- end }}
        {{- if ( hasKey .Values.advanced.common.app_chart.values "tolerations") }}
        {{- include "app-chart.tolerations" . | indent 8 -}}
        {{- end }}
        {{- if ( hasKey .Values.spec "runtime_class_name") }}
        {{- include "app-chart.runtime_class_name" . | indent 8 -}}
        {{- end }}
        {{- with (.Values.advanced.node_selector | default .Values.advanced.common.app_chart.values.node_selector | default "") }}
        nodeSelector:
          {{- toYaml . | nindent 10 -}}
        {{- end }}
        {{- if ( hasKey .Values.advanced "image_pull_secrets") }}
        {{- if gt (len .Values.advanced.image_pull_secrets) 0 }}
        imagePullSecrets:
        {{- include "app-chart.imagePullSecrets" . | indent 8 }}
        {{- end }}
        {{- end }}
        {{- if or ( hasKey .Values.spec.runtime "volumes") ( hasKey .Values.advanced.common.app_chart.values "additional_volumes") }}
        volumes:
        {{- if and ( hasKey .Values.spec.runtime "volumes") (gt (len .Values.spec.runtime.volumes) 0) }}
        {{- if and ( hasKey .Values.spec.runtime.volumes "config_maps") (gt (len .Values.spec.runtime.volumes.config_maps) 0) }}
          {{- include "app-chart.configsVolume" . | nindent 8 }}
        {{- end }}
        {{- if and ( hasKey .Values.spec.runtime.volumes "secrets") (gt (len .Values.spec.runtime.volumes.secrets) 0) }}
          {{- include "app-chart.secretsVolume" . | nindent 8 }}
        {{- end }}
        {{- if and ( hasKey .Values.spec.runtime.volumes "pvc") (gt (len .Values.spec.runtime.volumes.pvc) 0) }}
          {{- include "app-chart.pvcVolume" . | nindent 8 }}
        {{- end }}
        {{- if and ( hasKey .Values.spec.runtime.volumes "host_path") (gt (len .Values.spec.runtime.volumes.host_path) 0) }}
          {{- include "app-chart.hostPathVolume" . | nindent 8 }}
        {{- end }}
        {{- end }}
        {{- if and ( hasKey .Values.advanced.common.app_chart.values "additional_volumes") (gt (len .Values.advanced.common.app_chart.values.additional_volumes) 0) }}
        {{- toYaml .Values.advanced.common.app_chart.values.additional_volumes | nindent 8 -}}
        {{- end }}
        {{- end }}
        containers:
        - name: {{ include "app-chart.fullname" . }}
          image: {{ .Values.spec.release.image }}
          imagePullPolicy: {{ .Values.spec.release.image_pull_policy | default "IfNotPresent" }}
          {{- if hasKey .Values.spec.runtime "command" }}
          {{- if gt (len .Values.spec.runtime.command) 0 }}
          {{- include "app-chart.command" . | nindent 10 }}
          {{- end }}
          {{- end }}
          {{- if hasKey .Values.spec.runtime "args" }}
          {{- if gt (len .Values.spec.runtime.args) 0 }}
          {{- include "app-chart.args" . | nindent 10 }}
          {{- end }}
          {{- end }}
          env:
          {{- include "app-chart.env" . | indent 10 }}
          {{- include "app-chart.envFrom" . | indent 10 }}
          resources:
          {{- include "app-chart.resources" . | indent 12 }}
          {{- if or ( hasKey .Values.spec.runtime "volumes") ( hasKey .Values.advanced.common.app_chart.values "additional_volume_mounts") }}
          volumeMounts:
          {{- if and ( hasKey .Values.spec.runtime "volumes") (gt (len .Values.spec.runtime.volumes) 0) }}
          {{- if and ( hasKey .Values.spec.runtime.volumes "config_maps") (gt (len .Values.spec.runtime.volumes.config_maps) 0) }}
            {{- include "app-chart.configsVolumeMounts" . | indent 10 }}
          {{- end }}
          {{- if and ( hasKey .Values.spec.runtime.volumes "secrets") (gt (len .Values.spec.runtime.volumes.secrets) 0) }}
            {{- include "app-chart.secretsVolumeMounts" . | indent 10 }}
          {{- end }}
          {{- if and ( hasKey .Values.spec.runtime.volumes "pvc") (gt (len .Values.spec.runtime.volumes.pvc) 0) }}
            {{- include "app-chart.pvcVolumeMounts" . | indent 10 }}
          {{- end }}
          {{- if and ( hasKey .Values.spec.runtime.volumes "host_path") (gt (len .Values.spec.runtime.volumes.host_path) 0) }}
            {{- include "app-chart.hostPathVolumeMounts" . | indent 10 }}
          {{- end }}
          {{- end }}
          {{- include "app-chart.additionalVolMounts" . | indent 10 }}
          {{- end }}
        {{- if (hasKey .Values.advanced.common.app_chart.values "init_containers") }}
        {{- if gt (len .Values.advanced.common.app_chart.values.init_containers) 0 }}
        initContainers:
        {{- include "app-chart.initContainers" . | indent 8 }}
        {{- end }}
        {{- end }}
  pollingInterval: {{ default 30 .Values.spec.kedajob.polling_interval }}
  successfulJobsHistoryLimit: {{ default 0 .Values.spec.kedajob.successful_jobs_history_limit }}
  failedJobsHistoryLimit: {{ default 5 .Values.spec.kedajob.failed_jobs_history_limit }}
  maxReplicaCount: {{ default 10 .Values.spec.kedajob.max_replica_count }}
  triggers:
  {{- .Values.spec.kedajob.triggers | toYaml | nindent 2 }}
{{- end }}
